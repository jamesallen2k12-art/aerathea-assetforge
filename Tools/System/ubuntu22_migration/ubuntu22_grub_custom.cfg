menuentry "Ubuntu 22.04.5 ISO Installer (from Downloads)" --id ubuntu-22.04.5-iso {
    insmod part_gpt
    insmod btrfs
    insmod loopback
    insmod iso9660
    search --no-floppy --fs-uuid --set=isodev e389d3e0-ef55-4ae1-9281-5497223e4aa8
    set isofile="/home/Flamestrike/Downloads/ubuntu-22.04.5-desktop-amd64.iso"
    loopback loop ($isodev)$isofile
    linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile file=/cdrom/preseed/ubuntu.seed maybe-ubiquity quiet splash ---
    initrd (loop)/casper/initrd
}

